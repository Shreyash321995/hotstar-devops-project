name: Flask OTT CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t shreyash32951/hotstar-devops-project:latest .

      - name: Push Docker Image
        run: |
          docker push shreyash32951/hotstar-devops-project:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.13.213.83.162 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull shreyash32951/hotstar-devops-project:latest

            sudo docker stop hotstar-flask || true
            sudo docker rm hotstar-flask || true

            sudo docker run -d -p 5000:5000 \
            -e TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --name hotstar-flask \
             shreyash32951/hotstar-devops-project:latest
